name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: claudepanel-windows-installer
            allow_failure: false
          - os: macos-latest
            name: macOS
            artifact: claudepanel-macos-pkg
            # Wails v2 + getlantern/systray both define an Objective-C
            # AppDelegate class — Apple's modern ld64 refuses the duplicate
            # symbols. Real fix is a darwin-specific tray refactor (Wails
            # built-in menu, or a no-AppDelegate systray fork). Tracked
            # separately; allow this leg to fail without blocking releases.
            allow_failure: true
          - os: ubuntu-latest
            name: Linux
            artifact: claudepanel-linux
            allow_failure: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "semver=0.0.0-dev.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Windows ──
      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        run: wails build -platform windows/amd64 -nsis -ldflags "-X main.Version=${{ steps.version.outputs.version }}"

      - name: Stage Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Contents of build\bin:"
          Get-ChildItem build\bin
          New-Item -ItemType Directory -Force dist | Out-Null
          # Match whatever Wails NSIS produced (filename includes outputfilename + arch).
          $installer = Get-ChildItem build\bin -Filter '*installer*.exe' | Select-Object -First 1
          if (-not $installer) { throw "No installer .exe found in build\bin" }
          Copy-Item $installer.FullName "dist\ClaudePanel-${{ steps.version.outputs.semver }}-windows-amd64-setup.exe"

      # ── macOS ──
      - name: Build macOS app bundle
        if: matrix.os == 'macos-latest'
        run: wails build -platform darwin/universal -ldflags "-X main.Version=${{ steps.version.outputs.version }}"

      - name: Build macOS .pkg
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkgroot/Applications
          cp -R build/bin/ClaudePanel.app pkgroot/Applications/
          chmod +x build/darwin/scripts/postinstall build/darwin/scripts/preuninstall
          mkdir -p dist
          pkgbuild \
            --root pkgroot \
            --install-location / \
            --scripts build/darwin/scripts \
            --identifier com.claudepanel.pkg \
            --version "${{ steps.version.outputs.semver }}" \
            "dist/ClaudePanel-${{ steps.version.outputs.semver }}-macos-universal.pkg"

      # ── Linux ──
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (ubuntu-latest) dropped libwebkit2gtk-4.0-dev. Wails
          # v2.10+ supports the 4.1 series via the `webkit2_41` build tag.
          # libayatana-appindicator3-dev is needed by getlantern/systray.
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev pkg-config wget file

      - name: Build Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: wails build -platform linux/amd64 -tags webkit2_41 -ldflags "-X main.Version=${{ steps.version.outputs.version }}"

      - name: Normalise Linux binary name to lowercase
        if: matrix.os == 'ubuntu-latest'
        # Wails honours outputfilename ("ClaudePanel") on Linux too, but the
        # nfpm.yaml and AppImage script expect lowercase per Linux convention.
        run: cp build/bin/ClaudePanel build/bin/claudepanel

      - name: Install nfpm
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -sSfL https://github.com/goreleaser/nfpm/releases/download/v2.41.0/nfpm_2.41.0_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin nfpm

      - name: Build .deb and .rpm
        if: matrix.os == 'ubuntu-latest'
        env:
          VERSION: ${{ steps.version.outputs.semver }}
        run: |
          mkdir -p dist
          chmod +x build/linux/scripts/postinstall.sh build/linux/scripts/preremove.sh
          # nfpm doesn't expand env vars in the YAML — substitute first.
          sed "s/\${VERSION}/$VERSION/" build/linux/nfpm.yaml > nfpm.tmp.yaml
          nfpm package -f nfpm.tmp.yaml -p deb -t dist/
          nfpm package -f nfpm.tmp.yaml -p rpm -t dist/

      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
          chmod +x build/linux/build-appimage.sh build/linux/AppRun
          # appimagetool inside Docker / CI needs FUSE workaround:
          export APPIMAGE_EXTRACT_AND_RUN=1
          OUT_DIR=$PWD/dist ./build/linux/build-appimage.sh

      # ── Upload ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
