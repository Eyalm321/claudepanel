name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: claudepanel-windows-installer
            allow_failure: false
          - os: macos-latest
            name: macOS
            artifact: claudepanel-macos-pkg
            allow_failure: false
          - os: ubuntu-latest
            name: Linux
            artifact: claudepanel-linux
            allow_failure: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgtk-4-dev libwebkit2gtk-4.1-dev libwebkitgtk-6.0-dev libayatana-appindicator3-dev pkg-config wget file

      - name: Install Wails CLI
        shell: bash
        run: |
          git clone https://github.com/Eyalm321/wails.git --branch v3.0.0-alpha.96-mediaplayback.1 --depth 1 wails-fork
          cd wails-fork/v3/cmd/wails3
          go install
          cd ../../../
          rm -rf wails-fork

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "semver=0.0.0-dev.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Windows ──
      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Chocolatey's NSIS install doesn't add makensis to PATH for the
          # next step's shell. Append it to GITHUB_PATH so Wails finds it.
          "C:\Program Files (x86)\NSIS" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_PATH

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        working-directory: ./windows
        run: wails3 task package WAILS3=wails3

      - name: Stage Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Contents of bin:"
          Get-ChildItem bin
          New-Item -ItemType Directory -Force dist | Out-Null
          # Match whatever Wails NSIS produced (filename includes outputfilename + arch).
          $installer = Get-ChildItem bin -Filter '*installer*.exe' | Select-Object -First 1
          if (-not $installer) { throw "No installer .exe found in bin" }
          Copy-Item $installer.FullName "dist\ClaudePanel-${{ steps.version.outputs.semver }}-windows-amd64-setup.exe"

      # ── macOS ──
      - name: Build macOS app bundle
        if: matrix.os == 'macos-latest'
        working-directory: ./darwin
        run: wails3 task package:universal WAILS3=wails3

      - name: Build macOS .pkg
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkgroot/Applications
          cp -R bin/ClaudePanel.app pkgroot/Applications/
          chmod +x build/darwin/scripts/postinstall build/darwin/scripts/preuninstall
          mkdir -p dist
          pkgbuild \
            --root pkgroot \
            --install-location / \
            --scripts build/darwin/scripts \
            --identifier com.claudepanel.pkg \
            --version "${{ steps.version.outputs.semver }}" \
            "dist/ClaudePanel-${{ steps.version.outputs.semver }}-macos-universal.pkg"


      - name: Build Linux binary
        if: matrix.os == 'ubuntu-latest'
        working-directory: ./linux
        run: wails3 task build WAILS3=wails3 EXTRA_TAGS=webkit2_41

      - name: Normalise Linux binary name to lowercase
        if: matrix.os == 'ubuntu-latest'
        # Wails honours outputfilename ("ClaudePanel") on Linux too, but the
        # nfpm.yaml and AppImage script expect lowercase per Linux convention.
        run: cp bin/ClaudePanel bin/claudepanel

      - name: Install nfpm
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -sSfL https://github.com/goreleaser/nfpm/releases/download/v2.41.0/nfpm_2.41.0_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin nfpm

      - name: Build .deb and .rpm
        if: matrix.os == 'ubuntu-latest'
        env:
          VERSION: ${{ steps.version.outputs.semver }}
        run: |
          mkdir -p dist
          chmod +x build/linux/scripts/postinstall.sh build/linux/scripts/preremove.sh
          # nfpm doesn't expand env vars in the YAML — substitute first.
          sed "s/\${VERSION}/$VERSION/" build/linux/nfpm.yaml > nfpm.tmp.yaml
          nfpm package -f nfpm.tmp.yaml -p deb -t dist/
          nfpm package -f nfpm.tmp.yaml -p rpm -t dist/

      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
          chmod +x build/linux/build-appimage.sh build/linux/AppRun
          # appimagetool inside Docker / CI needs FUSE workaround:
          export APPIMAGE_EXTRACT_AND_RUN=1
          OUT_DIR=$PWD/dist ./build/linux/build-appimage.sh

      # ── Upload ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
