<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Panel — Menu</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <!-- Reuse #settings-root so the shared theme CSS (which scopes the palette
       variables to #settings-root.theme-*) cascades to the menu, matching the
       bar's active theme. -->
  <div id="settings-root">
    <div class="brand-menu">
      <button class="brand-menu-item" id="menu-check-updates" type="button">
        <span class="brand-menu-icon" aria-hidden="true"></span>
        <span class="brand-menu-label">CHECK FOR UPDATES</span>
        <span class="brand-menu-hint" id="menu-update-hint"></span>
      </button>
      <button class="brand-menu-item brand-menu-item--danger" id="menu-exit" type="button">
        <span class="brand-menu-icon" aria-hidden="true"></span>
        <span class="brand-menu-label">EXIT</span>
      </button>
    </div>
  </div>

  <script src="./src/menu.js" type="module"></script>
</body>
</html>
