<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Update</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="settings-root" style="--wails-draggable: no-drag; height: 100vh; margin: 0; padding: 0; box-sizing: border-box;">
    <div class="modal" style="height: 100vh; box-sizing: border-box; display: flex; flex-direction: column;">
      <div class="modal-titlebar" style="--wails-draggable: drag">
        <span class="modal-brand">
          <svg class="invader" viewBox="0 0 11 8"><path d="M2,0h1v1h-1z M8,0h1v1h-1z M3,1h1v1h-1z M7,1h1v1h-1z M2,2h7v1h-7z M1,3h2v1h-2z M4,3h1v1h-1z M6,3h1v1h-1z M8,3h2v1h-2z M0,4h11v1h-11z M0,5h1v1h-1z M2,5h7v1h-7z M10,5h1v1h-1z M0,6h1v1h-1z M2,6h1v1h-1z M8,6h1v1h-1z M10,6h1v1h-1z M3,7h2v1h-2z M6,7h2v1h-2z"/></svg>
        </span>
        <span class="modal-title">SYSTEM UPDATE</span>
        <button class="modal-close" id="modal-close" title="Close (Esc)" style="--wails-draggable: no-drag">✕</button>
      </div>

      <div class="modal-main" style="flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 16px; box-sizing: border-box;">
        
        <!-- Details Panel -->
        <div id="panel-details" style="flex: 1; min-height: 0; display: flex; flex-direction: column;">
          <div style="display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; margin-bottom: 12px; font-size: 13px;">
            <span style="opacity: 0.6;">CURRENT VERSION:</span>
            <span id="val-current" style="font-weight: bold;">v---</span>

            <span style="opacity: 0.6;">LATEST VERSION:</span>
            <span id="val-latest" style="color: var(--color-accent, #00ff66); font-weight: bold;">v---</span>
          </div>

          <div style="opacity: 0.6; font-size: 11px; margin-bottom: 4px; font-weight: bold;">RELEASE NOTES:</div>
          <div id="val-changelog" style="flex: 1; min-height: 0; overflow-y: auto; border: 1px solid var(--color-border, #333); padding: 12px; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.25); white-space: pre-wrap; line-height: 1.5; margin-bottom: 16px; box-sizing: border-box; border-radius: 2px;"></div>

          <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button id="btn-later" class="p-btn" style="padding: 6px 20px; cursor: pointer; background: transparent; border: 1px solid var(--color-border, #333); color: var(--color-text, #fff); font-size: 12px;">LATER</button>
            <button id="btn-update" class="p-btn p-prim-col" style="padding: 6px 20px; cursor: pointer; border: none; font-size: 12px; font-weight: bold;">UPDATE NOW</button>
          </div>
        </div>

        <!-- Progress Panel (Hidden initially) -->
        <div id="panel-progress" style="display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 24px; box-sizing: border-box;">
          <div id="progress-status" style="font-size: 15px; margin-bottom: 16px; font-weight: bold; text-transform: uppercase;">Downloading Update...</div>
          
          <div style="width: 100%; max-width: 440px; border: 1px solid var(--color-border, #333); height: 26px; position: relative; background: rgba(0,0,0,0.3); display: flex; align-items: center; border-radius: 2px; overflow: hidden; margin-bottom: 10px;">
            <div id="progress-bar-fill" style="background: var(--color-accent, #00ff66); height: 100%; width: 0%; transition: width 0.1s ease;"></div>
            <div id="progress-percent" style="position: absolute; width: 100%; text-align: center; font-family: monospace; font-weight: bold; font-size: 12px; color: #fff; mix-blend-mode: difference;">0%</div>
          </div>
          
          <div id="progress-details" style="font-size: 11px; opacity: 0.6; font-family: monospace;">0.00 / 0.00 MB</div>
        </div>

      </div>
    </div>
  </div>

  <script src="./src/update.js" type="module"></script>
</body>
</html>
