<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__claudepanel__</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="bar" style="--wails-draggable: no-drag">
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Brand (click for menu: Check for updates / Exit) -->
    <div class="seg seg--brand seg--nodrag" id="seg-brand" title="Menu">
      <svg class="invader" viewBox="0 0 11 8"><path d="M2,0h1v1h-1z M8,0h1v1h-1z M3,1h1v1h-1z M7,1h1v1h-1z M2,2h7v1h-7z M1,3h2v1h-2z M4,3h1v1h-1z M6,3h1v1h-1z M8,3h2v1h-2z M0,4h11v1h-11z M0,5h1v1h-1z M2,5h7v1h-7z M10,5h1v1h-1z M0,6h1v1h-1z M2,6h1v1h-1z M8,6h1v1h-1z M10,6h1v1h-1z M3,7h2v1h-2z M6,7h2v1h-2z"/></svg>
    </div>

    <div class="sep">·</div>

    <!-- Main Bar Statistics and Controls -->
    <div id="bar-main-contents" style="display: flex; align-items: center; flex: 1; min-width: 0; height: 100%;">
      <!-- Account cycler: ◀ MAIN [MAX] ▶ — click arrows to switch -->
      <div class="seg seg--nodrag" id="seg-acct" title="Click ◀ ▶ to switch account">
        <span class="arrow" id="btn-acct-prev">◀</span>
        <span class="val" id="val-acct">---</span>
        <span class="sub" id="val-sub">[---]</span>
        <span class="arrow" id="btn-acct-next">▶</span>
      </div>

      <div class="sep">·</div>

      <!-- Msgs this billing period -->
      <div class="seg" id="seg-msgs"><span class="lbl">MSGS:</span><span class="val-wrap"><span class="val" id="val-msgs">---</span><span class="prog" id="prog-wrap"><span class="prog-text"><span class="prog-fill" id="prog-fill-text"></span><span class="prog-empty" id="prog-empty-text"></span></span><span class="prog-bar"><span class="prog-bar-fill" id="prog-fill-bar"></span><span class="cursor-bar"></span></span></span><span class="cursor-text">█</span></span></div>

      <div class="sep">·</div>

      <!-- Reset countdown (weekly) -->
      <div class="seg" id="seg-reset">
        <span class="lbl">RESET:</span>
        <span class="val" id="val-reset">---</span>
      </div>

      <div class="sep" id="sep-hourly" style="display: none;">·</div>

      <!-- 5-hour rolling usage -->
      <div class="seg" id="seg-hourly" style="display: none;"><span class="lbl">5H:</span><span class="val-wrap"><span class="val" id="val-hourly">---</span><span class="prog" id="prog-wrap-hourly"><span class="prog-text"><span class="prog-fill" id="prog-fill-hourly-text"></span><span class="prog-empty" id="prog-empty-hourly-text"></span></span><span class="prog-bar"><span class="prog-bar-fill" id="prog-fill-hourly-bar"></span><span class="cursor-bar"></span></span></span></span></div>

      <div class="sep" id="sep-hourly-reset" style="display: none;">·</div>

      <!-- 5-hour reset countdown -->
      <div class="seg" id="seg-hourly-reset" style="display: none;">
        <span class="lbl">RESET:</span>
        <span class="val" id="val-hourly-reset">---</span>
      </div>

      <div class="sep">·</div>

      <!-- Primary model -->
      <div class="seg">
        <span class="val" id="val-model">---</span>
      </div>

      <div class="sep">·</div>

      <!-- Session status -->
      <div class="seg" id="seg-status">
        <span class="val" id="val-status">IDLE</span>
      </div>

      <div class="spacer"></div>

      <!-- Terminal launcher cycler: ◀ ● NAME ▶ — click name/dot to open a labeled terminal -->
      <div class="seg seg--nodrag" id="seg-term" title="Click to open · Shift-click to add a sublabel · ◀ ▶ to switch">
        <span class="arrow" id="btn-term-prev">◀</span>
        <span class="dot" id="dot-term"></span>
        <span class="val" id="val-term">---</span>
        <span class="arrow" id="btn-term-next">▶</span>
      </div>

      <div class="sep" id="sep-term">·</div>

      <!-- Radio Toggle: ◀ CLAUDE FM ▶ [STATUS] · VOL XX% -->
      <div class="seg seg--nodrag" id="seg-radio" title="« » switches station, ‹ › skips track (grayed out for single-track / livestream stations). ▶/⏸ play/pause (resumes where you left off). Shuffle toggles random play order. Scroll/click VOL to adjust volume.">
        <span class="arrow" id="btn-radio-prev" title="Previous station">«</span>
        <span class="arrow" id="btn-radio-track-prev" title="Previous track">‹</span>
        <div class="radio-title-wrap"><span class="lbl" id="radio-title">CLAUDE FM</span></div>
        <span class="arrow" id="btn-radio-track-next" title="Next track">›</span>
        <span class="arrow" id="btn-radio-next" title="Next station">»</span>
        <span class="radio-btn" id="radio-status" title="Play">
          <svg class="radio-ico ico-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg class="radio-ico ico-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6z M14 5h4v14h-4z"/></svg>
        </span>
        <span class="radio-btn" id="btn-radio-shuffle" title="Shuffle">
          <svg class="radio-ico" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/>
            <path d="m18 2 4 4-4 4"/>
            <path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/>
            <path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/>
            <path d="m18 14 4 4-4 4"/>
          </svg>
        </span>
        <span class="sep" id="radio-vol-sep">·</span>
        <span class="lbl" id="radio-vol-lbl">VOL</span>
        <span class="val" id="radio-vol">50%</span>
      </div>

      <div class="sep">·</div>

      <!-- Monitor cycler: ◀ MON 1 ▶ — click arrows to move bar between screens -->
      <div class="seg seg--nodrag" id="seg-mon" title="Click ◀ ▶ to move bar to another screen">
        <span class="arrow" id="btn-mon-prev">◀</span>
        <span class="lbl">MON</span>
        <span class="val" id="val-mon">1</span>
        <span class="arrow" id="btn-mon-next">▶</span>
      </div>

      <div class="sep">·</div>

      <!-- Theme cycler: ◀ THEME CLAUDE ▶ -->
      <div class="seg seg--nodrag" id="seg-theme" title="Click ◀ ▶ to change theme">
        <span class="arrow" id="btn-theme-prev">◀</span>
        <span class="lbl">THEME</span>
        <span class="val" id="val-theme">CLAUDE</span>
        <span class="arrow" id="btn-theme-next">▶</span>
      </div>

      <div class="sep">·</div>

      <!-- Pin/unpin toggle: orange = pinned (docked + always visible), gray = unpinned (auto-hide on mouseleave) -->
      <div class="seg seg--nodrag" id="seg-pin" title="Pin / unpin (auto-hide on mouseleave)">
        <svg class="pin-icon" id="icon-pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
      </div>
    </div>

  </div>

  <script src="./src/main.js" type="module"></script>
</body>
</html>
