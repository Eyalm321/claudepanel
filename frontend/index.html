<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__claudebar__</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="bar" style="--wails-draggable: drag">
    <div class="scanlines" aria-hidden="true"></div>

    <div class="segment segment--brand">
      <span class="bracket">[</span><span class="brand-text">CLAUDE</span><span class="bracket">]</span>
    </div>

    <div class="sep">│</div>

    <div class="segment" id="seg-account">
      <span class="lbl">ACCT:</span>
      <span class="val" id="val-account">---</span>
    </div>

    <div class="sep">│</div>

    <div class="segment" id="seg-weekly">
      <span class="lbl">USAGE:</span>
      <span class="val" id="val-weekly-pct">0%</span>
      <span class="prog" id="val-progress" aria-label="usage bar">
        <span class="prog-fill" id="prog-fill"></span><span class="prog-empty" id="prog-empty"></span>
      </span>
    </div>

    <div class="sep">│</div>

    <div class="segment">
      <span class="lbl">RESET:</span>
      <span class="val" id="val-reset">--D --H</span>
    </div>

    <div class="sep">│</div>

    <div class="segment">
      <span class="lbl">MODEL:</span>
      <span class="val" id="val-model">---</span>
    </div>

    <div class="sep">│</div>

    <div class="segment">
      <span class="lbl">TODAY:</span>
      <span class="val" id="val-today">0</span>
    </div>

    <div class="sep">│</div>

    <div class="segment" id="seg-status">
      <span class="lbl">STATUS:</span>
      <span class="val" id="val-status">OFFLINE</span>
      <span class="cursor blink">▋</span>
    </div>

    <div class="spacer"></div>

    <div class="segment segment--actions" style="--wails-draggable: no-drag">
      <span class="action-btn" id="btn-prev" title="Previous account">◀</span>
      <span class="val" id="val-acct-sub" title="Subscription type">---</span>
      <span class="action-btn" id="btn-next" title="Next account">▶</span>
    </div>
  </div>

  <script src="./src/main.js" type="module"></script>
</body>
</html>
